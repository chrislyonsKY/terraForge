# EarthForge Pipeline — NDVI from Sentinel-2 over Kentucky
#
# Run:   earthforge pipeline run examples/scripts/ndvi_pipeline.yaml
# Check: earthforge pipeline validate examples/scripts/ndvi_pipeline.yaml
#
# This pipeline searches Sentinel-2 L2A for clear scenes over central
# Kentucky, computes NDVI for each scene, and converts the result to COG.
#
# Prerequisites:
#   pip install earthforge[all]
#   earthforge config init

pipeline:
  name: sentinel2-ndvi-kentucky
  description: >
    NDVI computation from Sentinel-2 L2A over Lexington, KY.
    Searches Element84 Earth Search, downloads red (B04) and NIR (B08)
    bands, computes NDVI with safe AST evaluator, converts to COG.

  output_dir: ./output/ndvi

  # 4 concurrent items — each item downloads 2 bands and runs 2 steps in serial
  parallel: 4

  source:
    stac_search:
      api: https://earth-search.aws.element84.com/v1
      collection: sentinel-2-l2a
      bbox: [-84.6, 37.9, -84.4, 38.1]         # Lexington, KY
      datetime: "2025-06-01/2025-09-30"
      query:
        eo:cloud_cover:
          lt: 20
      limit: 3

  steps:
    - for_each_item:

        # Step 1: Download the red and NIR bands
        - stac.fetch:
            assets: [B04, B08]
            parallel: 2

        # Step 2: Compute NDVI = (NIR - Red) / (NIR + Red)
        - raster.calc:
            expression: "(B08 - B04) / (B08 + B04)"
            output: "ndvi_{item_id}.tif"
            dtype: float32

        # Step 3: Convert NDVI GeoTIFF to Cloud Optimized GeoTIFF
        - raster.convert:
            format: COG
            compression: deflate
            input: result
            output: "ndvi_{item_id}_cog.tif"
