site_name: EarthForge
site_description: Cloud-native geospatial developer toolkit — COG, GeoParquet, STAC, Zarr.
site_url: https://chrislyonsKY.github.io/earthForge
repo_url: https://github.com/chrislyonsKY/earthForge
repo_name: chrislyonsKY/earthForge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source
            paths:
              - packages/core/src
              - packages/stac/src
              - packages/raster/src
              - packages/vector/src
              - packages/cube/src
              - packages/cli/src

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - CLI Reference: cli.md
  - Tutorials:
    - DEM Hillshade: tutorials/dem-hillshade.md
    - LiDAR Access (COPC): tutorials/lidar-access.md
    - Web Maps (TiTiler): tutorials/titiler-maps.md
    - ArcGIS Pro: tutorials/arcgis-pro.md
  - KyFromAbove Collections: stac-collections.md
  - Architecture: architecture.md
  - API Reference: api/reference.md
  - Release Notes: release-notes.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chrislyonsKY/earthForge
