[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "earthforge-cube"
version = "1.0.0"
description = "EarthForge datacube operations — Zarr and NetCDF inspection and slicing."
readme = "README.md"
requires-python = ">=3.11"
license = "GPL-3.0-or-later"
dependencies = [
    "earthforge-core>=0.1.0",
    "xarray>=2024.1",
    "zarr>=2.18",
    "h5netcdf>=1.3",
    "numpy>=1.26",
]

[tool.hatch.build.targets.wheel]
packages = ["src/earthforge"]
