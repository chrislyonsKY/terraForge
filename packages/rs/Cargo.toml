[package]
name = "earthforge-rs"
version = "1.0.0"
edition = "2021"
license = "GPL-3.0-or-later"
description = "Rust acceleration extensions for EarthForge"

[lib]
name = "earthforge_rs"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.23", features = ["extension-module"] }
rayon = "1.10"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
reqwest = { version = "0.12", features = ["rustls-tls"], default-features = false }
arrow = { version = "54", features = ["ffi"] }

[profile.release]
lto = true
codegen-units = 1
strip = true
