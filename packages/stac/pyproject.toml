[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "earthforge-stac"
version = "1.0.0"
description = "EarthForge STAC catalog interaction (search, info, validate)."
readme = "README.md"
requires-python = ">=3.11"
license = "GPL-3.0-or-later"
dependencies = [
    "earthforge-core>=0.1.0",
    "pystac-client>=0.8",
    "pystac>=1.9",
]

[project.urls]
Homepage = "https://github.com/chrislyonsKY/earthForge"
Repository = "https://github.com/chrislyonsKY/earthForge"
Documentation = "https://chrislyonsky.github.io/earthForge/"
Issues = "https://github.com/chrislyonsKY/earthForge/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/earthforge"]
