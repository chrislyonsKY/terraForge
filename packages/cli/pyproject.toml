[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "earthforge-cli"
version = "1.0.0"
description = "EarthForge CLI — thin Typer dispatch layer for cloud-native geospatial operations"
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
dependencies = [
    "earthforge-core>=0.1.0",
    "typer>=0.9",
    "textual>=0.52",
]

[project.urls]
Homepage = "https://github.com/chrislyonsKY/earthForge"
Repository = "https://github.com/chrislyonsKY/earthForge"
Documentation = "https://chrislyonsky.github.io/earthForge/"
Issues = "https://github.com/chrislyonsKY/earthForge/issues"

[project.scripts]
earthforge = "earthforge.cli.main:app"
tf = "earthforge.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/earthforge"]
