[build-system]
requires = ["hatchling>=1.18"]
build-backend = "hatchling.build"

[project]
name = "earthforge-core"
version = "1.0.0"
description = "EarthForge core: shared types, config, storage, output, format detection"
readme = "README.md"
license = "GPL-3.0-or-later"
requires-python = ">=3.11"
dependencies = [
    "httpx>=0.27",
    "obstore>=0.3",
    "pydantic>=2.0",
    "rich>=13.0",
    "orjson>=3.9",
]

[project.urls]
Homepage = "https://github.com/chrislyonsKY/earthForge"
Repository = "https://github.com/chrislyonsKY/earthForge"
Documentation = "https://chrislyonsky.github.io/earthForge/"
Issues = "https://github.com/chrislyonsKY/earthForge/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/earthforge"]
